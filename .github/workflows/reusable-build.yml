name: reusable-build

on:
  workflow_call:
    inputs:
      push_image:
        required: false
        type: boolean
        default: true
      reason:
        required: false
        type: string
        default: automated build

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Gather upstream metadata
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          docker pull nousresearch/hermes-agent:latest >/dev/null
          docker pull ghcr.io/nesquena/hermes-webui:latest >/dev/null
          echo "agent_digest=$(docker image inspect nousresearch/hermes-agent:latest --format '{{index .RepoDigests 0}}' | sed 's/.*@//')" >> "$GITHUB_OUTPUT"
          echo "webui_digest=$(docker image inspect ghcr.io/nesquena/hermes-webui:latest --format '{{index .RepoDigests 0}}' | sed 's/.*@//')" >> "$GITHUB_OUTPUT"
          echo "agent_commit=$(git ls-remote https://github.com/NousResearch/hermes-agent.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "webui_commit=$(git ls-remote https://github.com/nesquena/hermes-webui.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "date_tag=$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build local smoke-test image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg BUILD_DATE='${{ steps.upstream.outputs.build_date }}' \
            --build-arg VCS_REF='${{ github.sha }}' \
            --build-arg VERSION='${{ steps.upstream.outputs.date_tag }}' \
            --build-arg HERMES_AGENT_DIGEST='${{ steps.upstream.outputs.agent_digest }}' \
            --build-arg HERMES_WEBUI_DIGEST='${{ steps.upstream.outputs.webui_digest }}' \
            --build-arg HERMES_AGENT_COMMIT='${{ steps.upstream.outputs.agent_commit }}' \
            --build-arg HERMES_WEBUI_COMMIT='${{ steps.upstream.outputs.webui_commit }}' \
            -t hermes-suite-ci:${{ github.sha }} .

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh hermes-suite-ci:${{ github.sha }}

      - name: Log in to GHCR
        if: inputs.push_image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        if: inputs.push_image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.upstream.outputs.date_tag }}
            type=sha,format=short

      - name: Publish image to GHCR
        if: inputs.push_image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ steps.upstream.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.upstream.outputs.date_tag }}
            HERMES_AGENT_DIGEST=${{ steps.upstream.outputs.agent_digest }}
            HERMES_WEBUI_DIGEST=${{ steps.upstream.outputs.webui_digest }}
            HERMES_AGENT_COMMIT=${{ steps.upstream.outputs.agent_commit }}
            HERMES_WEBUI_COMMIT=${{ steps.upstream.outputs.webui_commit }}
